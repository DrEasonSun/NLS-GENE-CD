<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NLS GENE｜專屬健康評估 (科技版)</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
      :root{
        --brand-green:#008a27;--brand-orange:#ff6a00;--header-dark:#0a233a;
        --header-light:#14495e;--header-gold:#f4d03f;--bg-main:#f4f9f5;--text-main:#2c3e2d;
      }
      body{background:var(--bg-main);font-family:"Helvetica Neue",Arial,"Microsoft JhengHei",sans-serif;color:var(--text-main);}
      header{background:linear-gradient(135deg,var(--header-dark),var(--header-light));color:#fff;padding:50px 40px 60px;text-align:center;border-bottom:6px solid var(--header-gold);box-shadow:0 4px 12px rgba(0,0,0,.15);}
      .logo-text{font-size:2.4rem;font-weight:900;margin-bottom:8px}.logo-feat{color:var(--header-gold)}.logo-era{color:var(--brand-orange)}
      .container-box{max-width:960px;margin:-40px auto 60px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(10,35,58,.15);padding:45px 50px;}
      .btn-primary{background:var(--brand-green);border-color:var(--brand-green)}.btn-primary:hover{background:#00661d;border-color:#00661d}
      .required::after{content:" *";color:#d32f2f} footer{margin-top:40px}
      textarea.result{font-size:.875rem;margin-top:4px}
      .confirm-wrap{display:flex;justify-content:flex-end}
      @media (max-width:575.98px){.container-box{margin:-30px 10px 30px;padding:30px 18px}}
    </style>
  </head>

  <body>
    <header>
      <div class="logo-text"><span class="logo-feat">NLS</span><span class="logo-era">GENE</span></div>
      <h2 class="h4 mb-0">基因檢測健康精準評估</h2>
      <p class="text-light">專業建模：孫苓獻醫師 TCMD/ND/PhD</p>
    </header>

    <div class="container-box">
      <form id="clientForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label required">姓名</label>
            <input class="form-control" type="text" name="name" required placeholder="請輸入姓名"/>
          </div>
          <div class="col-md-3">
            <label class="form-label required">性別</label>
            <select class="form-select" name="gender" id="gender" required>
              <option value="">--</option><option value="男">男</option><option value="女">女</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label required">出生年月日</label>
            <input class="form-control" type="date" name="birthdate" required />
          </div>

          <div class="col-md-4">
            <label class="form-label">血型</label>
            <select class="form-select" name="bloodtype"><option value="">--</option><option>A</option><option>B</option><option>AB</option><option>O</option></select>
          </div>

          <!-- ====== 曾摘除器官 ====== -->
          <div class="col-12">
            <label class="form-label">曾摘除器官</label>
            <select class="form-select" id="removed_organs" multiple size="6"></select>
            <textarea class="form-control result" id="removed_organs_view" rows="2"></textarea>
            <div class="confirm-wrap mt-1"><button type="button" class="btn btn-sm btn-outline-secondary" id="btn_removed_organs">確認</button></div>
            <input type="hidden" name="removed_organs_result" id="removed_organs_hidden"/>
          </div>

          <!-- ====== 家族病史 ====== -->
          <div class="col-12">
            <label class="form-label">家族病史</label>
            <select class="form-select" id="family_history" multiple size="6"></select>
            <textarea class="form-control result" id="family_history_view" rows="2"></textarea>
            <div class="confirm-wrap mt-1"><button type="button" class="btn btn-sm btn-outline-secondary" id="btn_family_history">確認</button></div>
            <input type="hidden" name="family_history_result" id="family_history_hidden"/>
          </div>

          <!-- ====== 個人病史 ====== -->
          <div class="col-12">
            <label class="form-label">個人病史</label>
            <select class="form-select" id="personal_history" multiple size="6"></select>
            <textarea class="form-control result" id="personal_history_view" rows="2"></textarea>
            <div class="confirm-wrap mt-1"><button type="button" class="btn btn-sm btn-outline-secondary" id="btn_personal_history">確認</button></div>
            <input type="hidden" name="personal_history_result" id="personal_history_hidden"/>
          </div>

          <!-- ====== 自訴症狀 ====== -->
          <div class="col-12">
            <label class="form-label">自訴症狀</label>
            <select class="form-select" id="symptoms" multiple size="6"></select>
            <textarea class="form-control result" id="symptoms_view" rows="2"></textarea>
            <div class="confirm-wrap mt-1"><button type="button" class="btn btn-sm btn-outline-secondary" id="btn_symptoms">確認</button></div>
            <input type="hidden" name="symptoms_result" id="symptoms_hidden"/>
          </div>

          <!-- ====== 用藥 / 病歷照片 ====== -->
          <div class="col-12">
            <label class="form-label">目前用藥或病歷摘要 (上傳照片)</label>
            <input class="form-control" type="file" name="med_files" accept="image/*" multiple />
          </div>
        </div>

        <button class="btn btn-primary w-100 mt-4" type="submit">送出資料</button>
      </form>
    </div>
    <footer class="text-center text-muted my-4">&copy; 2026 NLS GENE｜系統規劃 : 孫苓獻博士</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        /* ---------- 選項資料 ---------- */
        const organCommon=["闌尾","扁桃腺","膽囊","甲狀腺","左眼","右眼","左腎","右腎","左上肺葉","左下肺葉","右上肺葉","右中肺葉","右下肺葉","左臂","右臂"];
        const organFemale=["左乳","右乳","左卵巢輸卵管","右卵巢輸卵管","子宮"];
        const organMale=["前列腺"];
        const diseaseCommon=["糖尿病","高血壓","心臟病","高血脂","慢性肝病","慢性腎病","中風","癌症","自體免疫病","氣喘","過敏性鼻炎","憂鬱症","骨質疏鬆","失智症","痛風","胃潰瘍","肥胖"];
        const diseaseFemale=["子宮肌瘤","乳腺增生"];
        const diseaseMale=["攝護腺肥大"];
        const symptomCommon=["疲勞","失眠","頭痛","眩暈","背痛","關節痛","便秘","腹瀉","胃脹氣","皮膚乾癢","過敏","情緒低落","焦慮","手腳冰冷","心悸","呼吸急促","口乾","肌肉痠痛","體重增加","體重減輕"];
        const symptomFemale=["月經不調","經痛"];
        const symptomMale=["夜間頻尿"];
        const extra="其他";

        /* ---------- 元件對照表 ---------- */
        const mapping=[
          {key:"removed_organs", base:organCommon, f:organFemale, m:organMale, label:"曾摘除器官"},
          {key:"family_history", base:diseaseCommon, f:diseaseFemale, m:diseaseMale, label:"家族病史"},
          {key:"personal_history", base:diseaseCommon, f:diseaseFemale, m:diseaseMale, label:"個人病史"},
          {key:"symptoms", base:symptomCommon, f:symptomFemale, m:symptomMale, label:"自訴症狀"}
        ];

        const genderSel=document.getElementById("gender");
        const confirmState={}; // true = confirmed

        /* ---------- 渲染選項 ---------- */
        function renderOptions(){
          const g=genderSel.value;
          mapping.forEach(({key,base,f,m})=>{
            const sel=document.getElementById(key);
            const txt=document.getElementById(key+"_view");
            const btn=document.getElementById("btn_"+key);
            const hidden=document.getElementById(key+"_hidden");

            // reset state
            confirmState[key]=false;
            btn.textContent="確認";
            sel.disabled=false;
            txt.readOnly=false;
            hidden.value="";
            sel.innerHTML="";
            txt.value="";

            let arr=[...base];
            if(g==="女")arr=[...arr,...f]; else if(g==="男")arr=[...arr,...m];
            arr.push(extra);
            arr.forEach(v=>{
              const o=document.createElement("option");
              o.value=v;o.textContent=v;sel.appendChild(o);
            });
          });
        }

        genderSel.addEventListener("change",renderOptions);
        renderOptions();

        /* ---------- 共用函式 ---------- */
        function updateView(key){
          const sel=document.getElementById(key);
          const vals=[...sel.selectedOptions].map(o=>o.value);
          document.getElementById(key+"_view").value=vals.join("，");
        }
        mapping.forEach(({key})=>{
          document.getElementById(key).addEventListener("change",()=>updateView(key));
          // 初始
          updateView(key);

          // 確認 / 重新編輯
          document.getElementById("btn_"+key).addEventListener("click",()=>{
            const sel=document.getElementById(key);
            const txt=document.getElementById(key+"_view");
            const hidden=document.getElementById(key+"_hidden");
            const btn=document.getElementById("btn_"+key);

            if(!confirmState[key]){ // 進行確認
              updateView(key);
              hidden.value=txt.value;
              sel.disabled=true;
              txt.readOnly=true;
              confirmState[key]=true;
              btn.textContent="重新編輯";
            }else{ // 重新編輯
              sel.disabled=false;
              txt.readOnly=false;
              hidden.value="";
              confirmState[key]=false;
              btn.textContent="確認";
            }
          });
        });

        /* ---------- EmailJS ---------- */
        const EMAILJS_SERVICE_ID="drlingxiansun@gmail.com";
        const EMAILJS_TEMPLATE_ID="template_o3yrt3o";
        const EMAILJS_PUBLIC_KEY="eLWd9BxdODbpLnR43";
        emailjs.init(EMAILJS_PUBLIC_KEY);

        /* ---------- 送出 ---------- */
        document.getElementById("clientForm").addEventListener("submit",e=>{
          e.preventDefault();
          // 檢查四大類都已確認
          for(const {key,label} of mapping){
            if(!confirmState[key]){
              alert("請先點擊「"+label+"」區塊的確認按鈕！");
              return;
            }
          }
          const btn=e.target.querySelector("button[type='submit']");
          btn.disabled=true;

          emailjs.sendForm(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,"#clientForm",EMAILJS_PUBLIC_KEY)
            .then(()=>{alert("資料已成功寄出，感謝填寫！");e.target.reset();btn.disabled=false;renderOptions();})
            .catch(err=>{console.error(err);alert("寄信失敗："+(err.text||err));btn.disabled=false;});
        });
      });
    </script>
  </body>
</html>
