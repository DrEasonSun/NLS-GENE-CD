<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NLS GENE｜專屬健康評估 (FEATERA 科技版)</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    :root{
      --brand-green:#008a27;--brand-orange:#ff6a00;
      --header-dark:#0a233a;--header-light:#14495e;--header-gold:#f4d03f;
      --bg-main:#f4f9f5;--text-main:#2c3e2d;
    }
    body{background:var(--bg-main);font-family:"Helvetica Neue",Arial,"Microsoft JhengHei",sans-serif;color:var(--text-main);}
    header{
      background:linear-gradient(135deg,var(--header-dark),var(--header-light));
      color:#fff;padding:50px 40px 60px;text-align:center;border-bottom:6px solid var(--header-gold);
      box-shadow:0 4px 12px rgba(0,0,0,.15);
    }
    .logo-text{font-size:2.4rem;font-weight:900;margin-bottom:8px;}
    .logo-feat{color:var(--header-gold);} .logo-era{color:var(--brand-orange);}
    .container-box{max-width:960px;margin:-40px auto 60px;background:#fff;border-radius:12px;
      box-shadow:0 8px 30px rgba(10,35,58,.15);padding:45px 50px;}
    .btn-primary{background:var(--brand-green);border-color:var(--brand-green);}
    .btn-primary:hover{background:#00661d;border-color:#00661d;}
    .required::after{content:" *";color:#d32f2f;}
    .select-footer{font-size:.9rem;color:#666;}
    @media(max-width:575.98px){.container-box{margin:-30px 10px 30px;padding:30px 18px;}}
  </style>
</head>
<body>
<!-- ===== Header ===== -->
<header>
  <div class="logo-text"><span class="logo-feat">NLS</span><span class="logo-era">GENE</span></div>
  <h2 class="h4 mb-0">基因檢測精準健康評估</h2>
  <p class="text-light">NLS 建模：孫苓獻醫師 TCMD/ND/PhD</p>
</header>

<!-- ===== Form Card ===== -->
<div class="container-box">
  <form id="clientForm">
    <div class="row g-3">
      <!-- 基本資料（依序輸入） -->
      <div class="col-md-6">
        <label class="form-label required">姓名</label>
        <input class="form-control" type="text" id="name" name="name" placeholder="請輸入姓名" required />
      </div>
      <div class="col-md-3">
        <label class="form-label required">性別</label>
        <select class="form-select" id="gender" name="gender" required disabled>
          <option value="">--</option><option value="男">男</option><option value="女">女</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label required">出生年月日</label>
        <input class="form-control" type="date" id="birthdate" name="birthdate" min="1900-01-01" required disabled/>
      </div>
      <div class="col-md-4">
        <label class="form-label">血型</label>
        <select class="form-select" id="bloodtype" name="bloodtype" disabled>
          <option value="">--</option><option>A</option><option>B</option><option>AB</option><option>O</option>
        </select>
      </div>

      <!-- ====== 1. 器官摘除 ====== -->
      <div class="col-12">
        <label class="form-label">曾摘除器官</label>
        <div id="removed_organs_group" class="d-flex flex-wrap gap-2"></div>
        <div id="removed_organs_other_wrapper" class="mt-2 d-none">
          <input class="form-control" id="removed_organs_other" placeholder="請輸入其他 (以逗號分隔)" />
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="removed_organs_confirm" disabled>確認此項</button>
        <div class="select-footer">已選擇：<span id="removed_organs_display">尚未選擇</span></div>
      </div>

      <!-- ====== 2. 家族病史 ====== -->
      <div class="col-12">
        <label class="form-label">家族病史</label>
        <div id="family_history_group" class="d-flex flex-wrap gap-2"></div>
        <div id="family_other_wrapper" class="mt-2 d-none">
          <input class="form-control" id="family_other" placeholder="請輸入其他 (以逗號分隔)" />
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="family_history_confirm" disabled>確認此項</button>
        <div class="select-footer">已選擇：<span id="family_history_display">尚未選擇</span></div>
      </div>

      <!-- ====== 3. 個人病史 ====== -->
      <div class="col-12">
        <label class="form-label">個人病史</label>
        <div id="personal_history_check_group" class="d-flex flex-wrap gap-2"></div>
        <div id="personal_other_wrapper" class="mt-2 d-none">
          <input class="form-control" id="personal_other" placeholder="請輸入其他 (以逗號分隔)" />
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="personal_history_check_confirm" disabled>確認此項</button>
        <div class="select-footer">已選擇：<span id="personal_history_check_display">尚未選擇</span></div>
      </div>

      <!-- ====== 4. 自訴症狀 ====== -->
      <div class="col-12">
        <label class="form-label">自訴症狀</label>
        <div id="symptoms_group" class="d-flex flex-wrap gap-2"></div>
        <div id="symptoms_other_wrapper" class="mt-2 d-none">
          <input class="form-control" id="symptoms_other" placeholder="請輸入其他 (以逗號分隔)" />
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="symptoms_confirm" disabled>確認此項</button>
        <div class="select-footer">已選擇：<span id="symptoms_display">尚未選擇</span></div>
      </div>
    </div>

    <button class="btn btn-primary mt-4 w-100" type="submit" id="submitBtn" disabled>送出資料</button>
  </form>
</div>

<footer class="text-center text-muted my-4">&copy; 2026 NLS GENE ｜ 系統規劃 孫苓獻博士</footer>

<!-- ===== 總確認 Modal ===== -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">資料確認</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body"><pre id="confirmContent" class="mb-0"></pre></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">返回修改</button>
        <button type="button" class="btn btn-primary" id="btnConfirmSend">確認並送出</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  /* ---------- 選項資料 ---------- */
  // 1) 器官
  const organCommon = ["闌尾","扁桃腺","膽囊","甲狀腺","左腎","右腎","左眼","右眼",
                       "左上肺葉","左下肺葉","右上肺葉","右中肺葉","右下肺葉",
                       "左臂","右臂","左下臂","右下臂","左手","右手","左腿","右腿",
                       "左小腿","右小腿","左腳","右腳"];
  const organFemaleOnly = ["左乳","右乳","左卵巢輸卵管","右卵巢輸卵管","子宮"];
  const organMaleOnly   = ["前列腺","左睪","右睪"];

  // 2) 疾病（家族/個人）
  const diseaseCommon = ["糖尿病","高血壓","心臟病","高血脂","甲狀腺疾病","慢性肝病",
                         "慢性腎病","中風","癌症","自體免疫病","氣喘","過敏性鼻炎",
                         "憂鬱症","骨質疏鬆","失智症","痛風","胃潰瘍","肥胖","乾癬"];
  const diseaseFemaleOnly = ["婦科疾病","乳癌"];
  const diseaseMaleOnly   = ["攝護腺肥大"];
  // 3) 症狀
  const symptomCommon = ["疲勞","失眠","頭痛","眩暈","背痛","關節痛","便秘","腹瀉",
                         "胃脹氣","皮膚乾癢","過敏","情緒低落","焦慮","手腳冰冷","心悸",
                         "呼吸急促","口乾","肌肉痠痛","體重增加","體重減輕"];
  const symptomFemaleOnly = ["經前不適","經期不規則"];
  const symptomMaleOnly   = ["夜間頻尿"];

  /* ---------- DOM 便捷存取 ---------- */
  const nameInput  = document.getElementById("name");
  const genderSel  = document.getElementById("gender");
  const birthInput = document.getElementById("birthdate");
  const bloodSel   = document.getElementById("bloodtype");

  /* ---------- 建立 checkbox 群組 ---------- */
  function createCheckboxGroup(containerId, options){
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    options.forEach(opt=>{
      const id = `${containerId}_${opt}`;
      const w = document.createElement("div");
      w.className = "form-check form-check-inline";
      const inp = document.createElement("input");
      inp.type="checkbox";inp.className="form-check-input";inp.id=id;inp.value=opt;inp.name=containerId;
      const lab = document.createElement("label");
      lab.className="form-check-label";lab.setAttribute("for",id);lab.textContent=opt;
      w.appendChild(inp);w.appendChild(lab);
      container.appendChild(w);
    });
  }

  /* ---------- 根據性別重建三個群組 ---------- */
  function rebuildGenderSpecificGroups(){
    const g = genderSel.value;
    const organs = organCommon
          .concat(g==="女"?organFemaleOnly:[])
          .concat(g==="男"?organMaleOnly:[])
          .concat("其他");
    const diseases = diseaseCommon
          .concat(g==="女"?diseaseFemaleOnly:[])
          .concat(g==="男"?diseaseMaleOnly:[])
          .concat("其他");
    const symptoms = symptomCommon
          .concat(g==="女"?symptomFemaleOnly:[])
          .concat(g==="男"?symptomMaleOnly:[])
          .concat("其他");

    createCheckboxGroup("removed_organs_group", organs);
    createCheckboxGroup("family_history_group", diseases);      // 家族病史(男女通用) 無需過濾
    createCheckboxGroup("personal_history_check_group", diseases);
    createCheckboxGroup("symptoms_group", symptoms);

    // 重新掛 event（因為元素被重建）
    attachOtherInputsHandler();
  }

  /* ---------- 「其他」輸入框顯示控制 ---------- */
  const otherMap = {
    removed_organs: "removed_organs_other_wrapper",
    family_history: "family_other_wrapper",
    personal_history_check: "personal_other_wrapper",
    symptoms: "symptoms_other_wrapper",
  };
  function attachOtherInputsHandler(){
    Object.entries(otherMap).forEach(([key,wrapperId])=>{
      const group = document.getElementById(`${key}_group`);
      group.addEventListener("change",()=>{
        const needShow=[...group.querySelectorAll('input[type="checkbox"]:checked')]
                        .some(i=>i.value==="其他");
        document.getElementById(wrapperId).classList.toggle("d-none",!needShow);
      });
    });
  }

  /* ---------- 初始：僅填姓名，其餘 disable ---------- */
  ["gender","birthdate","bloodtype"].forEach(id=>{
    document.getElementById(id).disabled = true;
  });
  // 四個步驟全部 disable
  ["removed_organs","family_history","personal_history_check","symptoms"].forEach(sid=>{
    document.querySelectorAll(`#${sid}_group input, #${sid}_confirm`).forEach(el=>el.disabled=true);
  });

  // 預先建立空群組（避免版面跳動），待性別確定後再重建
  createCheckboxGroup("removed_organs_group",[]);
  createCheckboxGroup("family_history_group",[]);
  createCheckboxGroup("personal_history_check_group",[]);
  createCheckboxGroup("symptoms_group",[]);
  attachOtherInputsHandler();

  /* ---------- 姓名輸入 → 啟用性別 ---------- */
  nameInput.addEventListener("input",()=>{
    genderSel.disabled = nameInput.value.trim()==="";
  });

  /* ---------- 性別變更：啟用生日 & 重建性別專屬選項 ---------- */
  genderSel.addEventListener("change",()=>{
    const g = genderSel.value;
    birthInput.disabled = !g;
    if(g){ rebuildGenderSpecificGroups(); }
  });

  /* ---------- 出生年月日輸入 → 啟用血型 & 第一步群組 ---------- */
  birthInput.addEventListener("input",()=>{
    const ok = !!birthInput.value;
    bloodSel.disabled = !ok;
    // 啟用第一步
    document.querySelectorAll(`#removed_organs_group input, #removed_organs_confirm`)
            .forEach(el=>el.disabled=!ok);
  });

  /* ---------- 步驟控制（四大組） ---------- */
  const steps = ["removed_organs","family_history","personal_history_check","symptoms"];
  const selectionsData={};
  steps.forEach((sid,idx)=>{
    const groupElem=document.getElementById(`${sid}_group`);
    const btn=document.getElementById(`${sid}_confirm`);
    const display=document.getElementById(`${sid}_display`);
    const otherWrapper=document.getElementById(otherMap[sid]);
    const otherInput=otherWrapper?.querySelector("input")||{value:""};

    btn.addEventListener("click",()=>{
      const checked=[...groupElem.querySelectorAll('input[type="checkbox"]:checked')].map(i=>i.value);
      if(checked.includes("其他")){
        const extras=otherInput.value.trim().split(/[,，]/).map(s=>s.trim()).filter(Boolean);
        checked.splice(checked.indexOf("其他"),1,...extras);
      }
      selectionsData[sid]=checked;
      display.textContent=checked.length?checked.join("，"):"（未選取）";

      // 鎖定本步
      groupElem.querySelectorAll('input[type="checkbox"]').forEach(i=>i.disabled=true);
      btn.disabled=true; otherInput.disabled=true;

      // 下一步
      if(idx+1<steps.length){
        const next=steps[idx+1];
        document.querySelectorAll(`#${next}_group input, #${next}_confirm`).forEach(el=>el.disabled=false);
      }else{
        document.getElementById("submitBtn").disabled=false;
      }
    });
  });

  /* ---------- 生日合法性再檢查 ---------- */
  birthInput.addEventListener("input",()=>{
    birthInput.setCustomValidity(birthInput.value && birthInput.value<"1900-01-01"
      ?"日期不可早於 1900-01-01":"");
  });

  /* ---------- EmailJS ---------- */
  const EMAILJS_SERVICE_ID = "drlingxiansun@gmail.com";
  const EMAILJS_TEMPLATE_ID = "template_o3yrt3o";
  const EMAILJS_PUBLIC_KEY = "eLWd9BxdODbpLnR43";
  emailjs.init(EMAILJS_PUBLIC_KEY);

  /* ---------- 送出前總確認 ---------- */
  const confirmModal=new bootstrap.Modal("#confirmModal");
  let finalPayload=null;
  document.getElementById("clientForm").addEventListener("submit",e=>{
    e.preventDefault();
    finalPayload={
      name: nameInput.value.trim(),
      gender: genderSel.value,
      birthdate: birthInput.value,
      bloodtype: bloodSel.value,
      ...selectionsData
    };
    document.getElementById("confirmContent").textContent=
      JSON.stringify(finalPayload,null,2);
    confirmModal.show();
  });

  /* ---------- 確認寄送 ---------- */
  document.getElementById("btnConfirmSend").addEventListener("click",async()=>{
    if(!finalPayload) return;
    try{
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID,{
        subject:`客戶名稱 ${finalPayload.name||"客戶"} 輸入資料`,
        to_email:"drlingxiansun@gmail.com",
        message:JSON.stringify(finalPayload,null,2),
      });
      confirmModal.hide();
      alert("資料已成功寄出，感謝填寫！");
      location.reload(); // 重新整理直接重設
    }catch(err){
      console.error(err);
      alert("寄信失敗："+(err.text||err));
    }
  });
});
</script>
</body>
</html>
